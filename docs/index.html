<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>SwaggerProvider — F# OpenAPI Type Provider</title>
  <link rel="stylesheet" href="https://unpkg.com/docute@4/dist/docute.css">
  <style>
    @import url(https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap);

    .page-content code { font-family: 'Fira Code', monospace; }
    @supports (font-variation-settings: normal) {
      .page-content code { font-family: 'Fira Code VF', monospace; }
    }

    /* Tighten sidebar spacing */
    .sidebar-links a { padding: 4px 0; }
  </style>
</head>

<body>
  <div id="docute"></div>
  <script src="https://unpkg.com/docute@4/dist/docute.js"></script>
  <script>
    new Docute({
      title: "SwaggerProvider",
      logo: `
        <div style="display:flex;align-items:center;gap:8px;">
          <img src="files/img/logo.png" alt="logo" height="28" width="28">
          <span style="font-weight:600;">SwaggerProvider</span>
        </div>`,
      nav: [
        { title: 'Home', link: '/' },
        { title: 'NuGet', link: 'https://www.nuget.org/packages/SwaggerProvider' },
        { title: 'GitHub', link: 'https://github.com/fsprojects/SwaggerProvider' }
      ],
      sidebar: [
        { title: 'Getting Started', link: '/' },
        { title: 'OpenApiClientProvider', link: '/OpenApiClientProvider' },
        { title: 'Customization', link: '/Customization' },
        { title: 'Release Notes', link: '/RELEASE_NOTES' },
        { title: 'References', link: '/References' }
      ],
      theme: 'dark',
      detectSystemDarkTheme: true,
      darkThemeToggler: true,
      layout: 'narrow',
      highlight: ['fsharp', 'bash'],
      target: '#docute'
    })
  </script>
</body>

</html>
